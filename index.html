<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Okrana — The private BAA AI for clinics & regulated practices</title>
  <meta name="description" content="Okrana is the private, HIPAA-grade AI assistant for medical clinics, law firms and regulated practices. Azure-hosted, zero data retention, BAA included. Built in Scottsdale, AZ." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&family=DM+Sans:opsz,wght@9..40,300..700&family=IBM+Plex+Sans:wght@300..600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": [
        "#f4f1ea",
        "#1b2030",
        "#d99a4f"
      ],
      "fonts": "instrument-dm",
      "heroCopy": "default"
    }/*EDITMODE-END*/;

    const PALETTES = {
      "forest-clay":  ["#f6f4ef", "#1f3a2e", "#c97b5a"],
      "midnight-amber": ["#f4f1ea", "#1b2030", "#d99a4f"],
      "sage-rose":    ["#f5f3ef", "#3d5a4a", "#b97564"],
      "ink-clay":     ["#efece4", "#1c1917", "#d97757"],
    };
    const paletteOptions = Object.values(PALETTES);

    const FONT_PAIRS = {
      "newsreader-geist":   { serif: "'Newsreader', Georgia, serif",         sans: "'Geist', ui-sans-serif, system-ui, sans-serif",       mono: "'Geist Mono', ui-monospace, monospace" },
      "instrument-dm":      { serif: "'Instrument Serif', Georgia, serif",   sans: "'DM Sans', ui-sans-serif, system-ui, sans-serif",     mono: "'Geist Mono', ui-monospace, monospace" },
      "sourceserif-plex":   { serif: "'Source Serif 4', Georgia, serif",     sans: "'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif", mono: "'Geist Mono', ui-monospace, monospace" },
    };

    function deriveVars(palette) {
      const [bg, accent, warm] = palette;
      return {
        '--bg': bg,
        '--accent': accent,
        '--warm': warm,
        '--accent-ink': bg,
        '--bg-2': mix(bg, '#000', 0.04),
        '--line':  mix(bg, '#000', 0.09),
        '--line-2': mix(bg, '#000', 0.16),
      };
    }
    function mix(a, b, t) {
      const pa = parse(a), pb = parse(b);
      const r = Math.round(pa[0]*(1-t) + pb[0]*t);
      const g = Math.round(pa[1]*(1-t) + pb[1]*t);
      const bl = Math.round(pa[2]*(1-t) + pb[2]*t);
      return `rgb(${r}, ${g}, ${bl})`;
    }
    function parse(hex){
      const h = hex.replace('#','');
      const n = parseInt(h.length===3? h.split('').map(c=>c+c).join('') : h, 16);
      return [(n>>16)&255, (n>>8)&255, n&255];
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        const root = document.documentElement;
        const vars = deriveVars(t.palette);
        Object.entries(vars).forEach(([k, v]) => root.style.setProperty(k, v));

        const fkey = t.fonts in FONT_PAIRS ? t.fonts : 'newsreader-geist';
        const fp = FONT_PAIRS[fkey];
        root.style.setProperty('--font-serif', fp.serif);
        root.style.setProperty('--font-sans', fp.sans);
        root.style.setProperty('--font-mono', fp.mono);
      }, [t.palette, t.fonts]);

      return (
        <>
          <Nav />
          <Hero copyKey={t.heroCopy} />
          <ComparisonDemo />
          <Features />
          <UseCases />
          <Security />
          <Testimonials />
          <Pricing />
          <FAQ />
          <FooterCTA />
          <Footer />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Palette" />
            <TweakColor
              label="Theme"
              value={t.palette}
              options={paletteOptions}
              onChange={(v) => setTweak('palette', v)}
            />

            <TweakSection label="Typography" />
            <TweakRadio
              label="Pairing"
              value={t.fonts}
              options={[
                { value: 'newsreader-geist', label: 'Newsreader / Geist' },
                { value: 'instrument-dm',    label: 'Instrument / DM' },
                { value: 'sourceserif-plex', label: 'Source / Plex' },
              ]}
              onChange={(v) => setTweak('fonts', v)}
            />

            <TweakSection label="Hero copy" />
            <TweakRadio
              label="Variant"
              value={t.heroCopy}
              options={[
                { value: 'default', label: 'Warm' },
                { value: 'trust',   label: 'Privacy' },
                { value: 'ai',      label: 'Anti-leak' },
              ]}
              onChange={(v) => setTweak('heroCopy', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
