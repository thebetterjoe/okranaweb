<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — Okrana</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;background:#F2EFE8;color:#0A0A0F;margin:0;padding:0;}main{max-width:400px;margin:100px auto 40px;padding:2rem;background:#fff;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.04);}h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;margin-bottom:1.5rem;}label{display:block;margin-bottom:.5rem;font-weight:500;}input[type=email],input[type=password]{width:100%;padding:.7rem .9rem;margin-bottom:1.2rem;border:1px solid #D9D4C9;border-radius:4px;font-size:1rem;}button{width:100%;padding:.85rem;background:#0C2340;color:#fff;font-size:1rem;font-weight:600;border:none;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;}button:hover{background:#B8902A;color:#0A0A0F;}footer{text-align:center;font-size:.9rem;color:#3D3D52;margin:2rem 0 0;}</style>
</head>
<body>
<main>
  <h1>Sign In</h1>
  <form action="#" method="post" autocomplete="on">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="username"/>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password"/>
    <button type="submit">Sign In</button>
  </form>
  <p style="margin-top:1.5rem;font-size:.95rem;">Need help? <a href="mailto:hello@okrana.com">Contact support</a></p>
</main>
<footer>© 2026 Okrana LLC · HIPAA-Compliant AI</footer>
</body>
</html>
